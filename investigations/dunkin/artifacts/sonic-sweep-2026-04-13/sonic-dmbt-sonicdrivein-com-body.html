
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Welcome to the Digital Menu Board API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;

        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;

            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);

            margin-top: 20px;
            padding: 15px;
            background: #0078D4;

            text-decoration: none;
        }
