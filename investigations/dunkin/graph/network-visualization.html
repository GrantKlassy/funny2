svg .link { stroke-opacity: 0.15; }
svg .link.highlighted { stroke-opacity: 0.7; }
svg .link.dimmed { stroke-opacity: 0.03; }
svg .node circle { cursor: pointer; transition: filter 0.15s; }

svg .node text { fill: #888; font-size: 9px; pointer-events: none; user-select: none; }

svg .cluster-hull { stroke-width: 1.5; stroke-dasharray: 4 2; }

// ========== BUILD GRAPH ==========

const degree = new Map();
graphData.nodes.forEach(n => degree.set(n.id, 0));
graphData.edges.forEach(e => {
  if (degree.has(e.source)) degree.set(e.source, degree.get(e.source) + 1);
  if (degree.has(e.target)) degree.set(e.target, degree.get(e.target) + 1);
});

const validEdges = graphData.edges.filter(e =>
  nodeMap.has(typeof e.source === 'string' ? e.source : e.source.id) &&
  nodeMap.has(typeof e.target === 'string' ? e.target : e.target.id)
);

const nodes = graphData.nodes.map(n => ({...n, degree: degree.get(n.id) || 0}));
const links = validEdges.map(e => ({...e}));

// ========== D3 SETUP ==========
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph').append('svg')
  .attr('width', width)
  .attr('height', height);

const g = svg.append('g');
let currentTransform = d3.zoomIdentity;
const zoom = d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', (event) => {
    currentTransform = event.transform;
    g.attr('transform', event.transform);
    g.selectAll('.node text')
      .attr('font-size', Math.max(6, Math.min(11, 9 / event.transform.k)) + 'px')
      .style('opacity', event.transform.k > 0.4 ? 1 : 0);
  });
svg.call(zoom);

// Glow filter
const defs = svg.append('defs');
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
const feMerge = filter.append('feMerge');
feMerge.append('feMergeNode').attr('in', 'coloredBlur');
feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

// ========== CLUSTER LAYOUT ==========
const clusterCenters = {};
const clusterList = [...new Set(nodes.map(n => n.cluster).filter(Boolean))];
const angleStep = (2 * Math.PI) / clusterList.length;
clusterList.forEach((c, i) => {
  const r = Math.min(width, height) * 0.3;
  clusterCenters[c] = {
    x: width / 2 + r * Math.cos(i * angleStep - Math.PI / 2),
    y: height / 2 + r * Math.sin(i * angleStep - Math.PI / 2)
  };
});

// ========== FORCE SIMULATION ==========
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
    const s = nodeMap.get(typeof d.source === 'string' ? d.source : d.source.id);
    const t = nodeMap.get(typeof d.target === 'string' ? d.target : d.target.id);
    if (s && t && s.cluster === t.cluster) return 55;
    return 140;
  }).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-200).distanceMax(500))
  .force('center', d3.forceCenter(width / 2, height / 2).strength(0.05))
  .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 5))
  .force('cluster', alpha => {
    nodes.forEach(n => {
      if (n.cluster && clusterCenters[n.cluster]) {
        const c = clusterCenters[n.cluster];
        n.vx += (c.x - n.x) * alpha * 0.08;
        n.vy += (c.y - n.y) * alpha * 0.08;
      }
    });
  })
  .alphaDecay(0.01)
  .velocityDecay(0.4);

function nodeRadius(d) {
  const base = d.type === 'platform' || d.type === 'parent-company' ? 9 :
               d.type === 'domain' ? 7 :
               d.type === 'vendor' ? 6 : 5;
  return base + Math.sqrt(d.degree || 0) * 1.8;
}

// ========== CLUSTER HULLS ==========
let showClusters = true;
const hullGroup = g.append('g').attr('class', 'hulls');

function updateHulls() {
  hullGroup.selectAll('path').remove();
  if (!showClusters) return;

  clusterList.forEach(clusterId => {
    const clusterNodes = nodes.filter(n => n.cluster === clusterId);
    if (clusterNodes.length < 3) return;

    const points = clusterNodes.map(n => [n.x, n.y]);
    const hull = d3.polygonHull(points);
    if (!hull) return;

    const cx = d3.mean(hull, p => p[0]);
    const cy = d3.mean(hull, p => p[1]);
    const expanded = hull.map(p => {
      const dx = p[0] - cx, dy = p[1] - cy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const expand = 35;
      return [p[0] + (dx/dist) * expand, p[1] + (dy/dist) * expand];
    });

    hullGroup.append('path')
      .attr('d', 'M' + expanded.join('L') + 'Z')
      .attr('class', 'cluster-hull')
      .attr('fill', clusterColors[clusterId] || '#ffffff11')
      .attr('stroke', clusterStrokes[clusterId] || '#ffffff22');
  });
}

// ========== DRAW EDGES ==========
const linkGroup = g.append('g').attr('class', 'links');
const link = linkGroup.selectAll('line')
  .data(links)
  .enter().append('line')
  .attr('class', 'link')
  .attr('stroke', d => {
    const t = d.type;
    if (t === 'SHARES_INFRA') return '#51cf66';
    if (t === 'OWNED_BY' || t === 'PARENT_OF' || t === 'MANAGED_BY') return '#ffd93d';
    if (t === 'CT_EXPOSES') return '#ff6b6b';
    if (t === 'BUILT_BY') return '#51cf66';
    if (t === 'MOBILE_ROUTE' || t === 'ANDROID_LINKS') return '#51cf66';
    if (t === 'PROMOTES_VIA' || t === 'TARGETS' || t === 'TRACKS') return '#e64980';
    if (t === 'LINKS_TO' || t === 'FALLBACK' || t === 'DESKTOP_REDIRECT') return '#4dabf7';
    if (t === 'REDIRECTS_TO' || t === 'CAMPAIGN_DOMAIN') return '#ff663388';
    return '#445';
  })
  .attr('stroke-width', d => {
    if (d.type === 'SHARES_INFRA' || d.type === 'CT_EXPOSES') return 2.5;
    if (d.type === 'BUILT_BY' || d.type === 'OWNED_BY') return 2;
    if (d.type === 'LINKS_TO' || d.type === 'MOBILE_ROUTE') return 1.8;
    return 1;
  });

// ========== DRAW NODES ==========
const nodeGroup = g.append('g').attr('class', 'nodes');
const node = nodeGroup.selectAll('g')
  .data(nodes)
  .enter().append('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

node.append('circle')
  .attr('r', d => nodeRadius(d))
  .attr('fill', d => typeColors[d.type] || '#666')
  .attr('stroke', d => {
    if (d.type === 'ct-exposure') return '#ff6b6b88';
    if (d.id === 'E2') return '#ff663388'; // ulink - the entry point
    return 'transparent';
  })
  .attr('stroke-width', d => (d.type === 'ct-exposure' || d.id === 'E2') ? 2 : 0)
  .style('filter', 'url(#glow)');

let showLabels = true;
node.append('text')
  .text(d => d.label)
  .attr('dx', d => nodeRadius(d) + 4)
  .attr('dy', 3)
  .attr('font-size', '9px');

// ========== TOOLTIP ==========
const tooltip = d3.select('#tooltip');

node.on('mouseover', function(event, d) {
  const connected = new Set();
  connected.add(d.id);
  links.forEach(l => {
    const sid = typeof l.source === 'string' ? l.source : l.source.id;
    const tid = typeof l.target === 'string' ? l.target : l.target.id;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });

  node.classed('dimmed', n => !connected.has(n.id));
  node.classed('highlighted', n => n.id === d.id);
  link.classed('dimmed', l => {
    const sid = typeof l.source === 'string' ? l.source : l.source.id;
    const tid = typeof l.target === 'string' ? l.target : l.target.id;
    return !connected.has(sid) || !connected.has(tid);
  });
  link.classed('highlighted', l => {
    const sid = typeof l.source === 'string' ? l.source : l.source.id;
    const tid = typeof l.target === 'string' ? l.target : l.target.id;
    return (sid === d.id || tid === d.id);
  });

  const color = typeColors[d.type] || '#888';
  let metaHtml = '';
  if (d.meta) {
    metaHtml = d.meta.split('\n').map(l => `<span>${l}</span>`).join('<br>');
  }
  metaHtml += `<br><span style="color:#555">Connections: ${d.degree}</span>`;
  if (d.cluster) metaHtml += `<br><span style="color:#555">Cluster: ${d.cluster}</span>`;

  tooltip.html(`
    <div class="tt-type" style="color:${color}">${d.type.replace(/-/g, ' ')}</div>
    <div class="tt-label">${d.label}</div>
    <div class="tt-meta">${metaHtml}</div>
  `).style('display', 'block');

  const ttEl = tooltip.node();
  let tx = event.clientX + 15;
  let ty = event.clientY - 10;
  if (tx + ttEl.offsetWidth > window.innerWidth - 20) tx = event.clientX - ttEl.offsetWidth - 15;
  if (ty + ttEl.offsetHeight > window.innerHeight - 20) ty = window.innerHeight - ttEl.offsetHeight - 20;
  tooltip.style('left', tx + 'px').style('top', ty + 'px');
})
.on('mousemove', function(event) {
  const ttEl = tooltip.node();
  let tx = event.clientX + 15;
  let ty = event.clientY - 10;
  if (tx + ttEl.offsetWidth > window.innerWidth - 20) tx = event.clientX - ttEl.offsetWidth - 15;
  if (ty + ttEl.offsetHeight > window.innerHeight - 20) ty = window.innerHeight - ttEl.offsetHeight - 20;
  tooltip.style('left', tx + 'px').style('top', ty + 'px');
})
.on('mouseout', function() {
  node.classed('dimmed', false).classed('highlighted', false);
  link.classed('dimmed', false).classed('highlighted', false);
  tooltip.style('display', 'none');
});

// ========== SIMULATION TICK ==========
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node.attr('transform', d => `translate(${d.x},${d.y})`);

  updateHulls();
});

// ========== DRAG ==========
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.1).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ========== SEARCH ==========
const searchInput = document.querySelector('#search input');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase();
  if (!q) {
    node.style('opacity', 1);
    node.selectAll('text').style('opacity', 1);
    link.style('opacity', null);
    return;
  }
  const matches = new Set();
  nodes.forEach(n => {
    if (n.label.toLowerCase().includes(q) || n.id.toLowerCase().includes(q) ||
        (n.type && n.type.toLowerCase().includes(q)) ||
        (n.meta && n.meta.toLowerCase().includes(q)) ||
        (n.cluster && n.cluster.toLowerCase().includes(q))) {
      matches.add(n.id);
    }
  });
  const expanded = new Set(matches);
  links.forEach(l => {
    const sid = typeof l.source === 'string' ? l.source : l.source.id;
    const tid = typeof l.target === 'string' ? l.target : l.target.id;
    if (matches.has(sid)) expanded.add(tid);
    if (matches.has(tid)) expanded.add(sid);
  });

  node.style('opacity', n => expanded.has(n.id) ? 1 : 0.05);
  node.selectAll('text').style('opacity', n => matches.has(n.id) ? 1 : 0);
  link.style('opacity', l => {
    const sid = typeof l.source === 'string' ? l.source : l.source.id;
    const tid = typeof l.target === 'string' ? l.target : l.target.id;
    return (matches.has(sid) || matches.has(tid)) ? 0.4 : 0.02;
  });
});

// ========== LEGEND ==========
const legendEl = document.getElementById('legend');
const typeLabels = {
  domain: 'Domain', service: 'Service', platform: 'Platform',
  vendor: 'Vendor', 'mobile-app': 'Mobile App', 'parent-company': 'Parent Company',
  'reddit-account': 'Reddit Account', 'ad-network': 'Ad Network',
  'deep-link': 'Deep Link', 'ad-creative': 'Ad Creative',
  org: 'Organization', 'ct-exposure': 'CT Log Exposure', portal: 'Portal',
};
let legendHtml = '<h3>Entity Types</h3>';
for (const [type, label] of Object.entries(typeLabels)) {
  if (!nodes.some(n => n.type === type)) continue;
  legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:${typeColors[type]}"></div><span class="legend-label">${label}</span></div>`;
}
legendHtml += '<h3 style="margin-top:12px">Clusters</h3>';
const clusterNames = {
  CL1: 'ddmprod Platform', CL2: 'Ad Pipeline', CL3: 'Vendor Stack',
  CL4: 'www Infrastructure', CL5: 'Inspire Brands', CL6: 'Baskin-Robbins',
  CL7: 'dunkinbrands.com Legacy', CL8: 'Vanity Domains',
};
for (const [id, name] of Object.entries(clusterNames)) {
  legendHtml += `<div class="legend-item"><div class="legend-dot" style="background:${clusterStrokes[id]?.replace('55','cc').replace('44','cc').replace('22','cc') || '#666'}"></div><span class="legend-label">${id}: ${name}</span></div>`;
}
legendEl.innerHTML = legendHtml;

// ========== STATS ==========
document.getElementById('stats').textContent =
  `${nodes.length} nodes \u00B7 ${links.length} edges \u00B7 ${clusterList.length} clusters \u00B7 from GRAPH.md \u00B7 probed 2026-04-13`;

// ========== CONTROLS ==========
function resetZoom() {
  svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
}
function toggleLabels() {
  showLabels = !showLabels;
  node.selectAll('text').style('display', showLabels ? null : 'none');
}
function toggleClusters() {
  showClusters = !showClusters;
  updateHulls();
}

// Initial zoom to fit
setTimeout(() => {
  const bounds = g.node().getBBox();
  const fullWidth = bounds.width + 100;
  const fullHeight = bounds.height + 100;
  const scale = Math.min(width / fullWidth, height / fullHeight, 1.5) * 0.85;
  const tx = width / 2 - (bounds.x + bounds.width / 2) * scale;
  const ty = height / 2 - (bounds.y + bounds.height / 2) * scale;
  svg.transition().duration(1500).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}, 3000);
</script>
</body>
</html>
