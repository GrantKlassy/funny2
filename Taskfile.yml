version: "3"

tasks:
  build:
    desc: Build the investigator container image
    cmds:
      - podman build -t investigator -f Containerfile.investigator .

  verify:
    desc: Verify all tools are present in the investigator image
    cmds:
      - |
        podman run --rm investigator bash -c '
        FAIL=0
        for cmd in curl wget dig whois ncat openssl jq exiftool nmap strings file xxd node npx redis-cli; do
          if command -v "$cmd" >/dev/null 2>&1; then
            echo "OK  $cmd"
          else
            echo "MISSING  $cmd"
            FAIL=1
          fi
        done
        exit $FAIL
        '

  check:
    desc: Run all standard repo checks
    cmds:
      - task: check:author
      - task: check:readme
      - task: check:license
      - task: check:history

  check:author:
    desc: Verify git identity is GrantKlassy
    cmds:
      - |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' — expected 'GrantKlassy'"
          exit 1
        fi
        echo "OK: git user.name is GrantKlassy"

  check:readme:
    desc: Verify README.md exists
    cmds:
      - |
        if [ ! -f README.md ]; then
          echo "ERROR: README.md missing"
          exit 1
        fi
        echo "OK: README.md exists"

  check:license:
    desc: Verify LICENSE.txt exists
    cmds:
      - |
        if [ ! -f LICENSE.txt ]; then
          echo "ERROR: LICENSE.txt missing"
          exit 1
        fi
        echo "OK: LICENSE.txt exists"

  check:history:
    desc: Verify no Co-Authored-By in git history
    cmds:
      - |
        COUNT=$(git log --all --grep="Co-Authored-By" --oneline | wc -l)
        if [ "$COUNT" -gt 0 ]; then
          echo "ERROR: $COUNT commits contain Co-Authored-By trailers"
          git log --all --grep="Co-Authored-By" --oneline
          exit 1
        fi
        echo "OK: no Co-Authored-By contamination"
